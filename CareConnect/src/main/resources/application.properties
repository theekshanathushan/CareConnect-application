# Database Connection
# Added allowPublicKeyRetrieval=true to prevent SSL/Public Key Retrieval errors
spring.datasource.url=jdbc:mysql://localhost:3306/careconnect_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Thushan@18260

# Hibernate (Auto-create tables and update schema)
# IMPORTANT: 'update' ensures the new 'isRead' column is added to the 'Message' table automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Port (Backend runs on 8080)
server.port=8080