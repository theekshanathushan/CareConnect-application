<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - CareConnect</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div id="root">
    <header>
        <nav>
            <div class="logo-container">
                <img src="../logo.svg" alt="CareConnect Logo" class="logo-img">
                <span class="logo-text">CareConnect</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="../index.html#services">Services</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
                <li><a href="dashboard.html" class="auth-btn">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="animation-elements">
                <div class="floating-element element-1">📊</div>
                <div class="floating-element element-2">📈</div>
                <div class="floating-element element-3">📋</div>
                <div class="floating-element element-4">📉</div>
                <div class="floating-element element-5">📌</div>
            </div>
            <div class="dashboard-container">
                <div class="dashboard-header">
                    <h1>Reports & Analytics</h1>
                    <p>Generate and view detailed reports on relief efforts</p>
                </div>

                <div class="report-filters">
                    <div class="filter-card">
                        <h3>Generate Report</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="report-type">Report Type</label>
                                <select id="report-type">
                                    <option value="">Select Report Type</option>
                                    <option value="daily">Daily Summary</option>
                                    <option value="weekly">Weekly Summary</option>
                                    <option value="monthly">Monthly Summary</option>
                                    <option value="category">By Category</option>
                                    <option value="geographic">Geographic Distribution</option>
                                    <option value="resource">Resource Utilization</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="date-range">Date Range</label>
                                <select id="date-range">
                                    <option value="">Select Date Range</option>
                                    <option value="today">Today</option>
                                    <option value="week">This Week</option>
                                    <option value="month">This Month</option>
                                    <option value="quarter">Last 3 Months</option>
                                    <option value="year">This Year</option>
                                    <option value="custom">Custom Range</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row" id="custom-date-fields" style="display: none;">
                            <div class="form-group">
                                <label for="start-date">Start Date</label>
                                <input type="date" id="start-date">
                            </div>

                            <div class="form-group">
                                <label for="end-date">End Date</label>
                                <input type="date" id="end-date">
                            </div>
                        </div>

                        <div class="filter-buttons">
                            <button class="btn secondary" id="resetBtn">Reset</button>
                            <button class="btn primary" id="generateBtn">Generate Report</button>
                        </div>
                    </div>
                </div>

                <div class="reports-container">
                    <div class="reports-header">
                        <h2>Generated Reports</h2>
                        <button class="btn secondary" onclick="alert('Export functionality coming soon!')">Export All</button>
                    </div>

                    <div class="reports-list" id="govReportsList">
                        <p style="text-align: center; color: #666; padding: 2rem;">Loading reports...</p>
                    </div>

                    <div class="pagination">
                        <button class="btn secondary">Previous</button>
                        <span class="page-info">Page 1 of 2</span>
                        <button class="btn secondary">Next</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 CareConnect. Helping communities recover together.</p>
    </footer>
</div>

<script src="../script.js"></script>
<script type="module" src="js/reports.js"></script>
</body>
</html>
