<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Map - CareConnect Government</title>
  <link rel="stylesheet" href="../styles.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

  <style>
    /* --- Page Specific Layout --- */
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .map-wrapper {
      background: #1e293b; /* Dark Card Background */
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      margin-top: 20px;
      height: 75vh; /* Occupy most of the screen */
      display: flex;
      flex-direction: column;
    }

    #map {
      flex-grow: 1;
      width: 100%;
      border-radius: 10px;
      background: #242f3e; /* Match map background */
      z-index: 1;
    }

    /* --- DARK THEME MAP FILTERS --- */
    .leaflet-layer,
    .leaflet-control-zoom-in,
    .leaflet-control-zoom-out,
    .leaflet-control-attribution {
      filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    /* --- PULSING MARKERS --- */
    .pulse-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .pin-dot {
      width: 12px; height: 12px; border-radius: 50%; z-index: 2;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
    .pin-ring {
      position: absolute; width: 12px; height: 12px; border-radius: 50%;
      animation: pulsate 2s infinite; z-index: 1; opacity: 0;
    }
    /* Colors */
    .pin-red .pin-dot { background-color: #ef4444; border: 2px solid white; }
    .pin-red .pin-ring { border: 3px solid #ef4444; }
    .pin-green .pin-dot { background-color: #10b981; border: 2px solid white; }
    .pin-green .pin-ring { border: 3px solid #10b981; }

    @keyframes pulsate {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(3); opacity: 0; }
    }

    /* --- CUSTOM POPUP --- */
    .custom-popup .leaflet-popup-content-wrapper {
      background: rgba(30, 41, 59, 0.95);
      color: #fff;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .custom-popup .leaflet-popup-tip { background: rgba(30, 41, 59, 0.95); }
    .custom-popup h4 { margin: 0 0 5px; color: #cbd5e1; font-size: 0.9rem; text-transform: uppercase; }
    .custom-popup strong { color: white; font-size: 1rem; }

    /* --- LEGEND --- */
    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      color: white;
    }
    .map-legend {
      display: flex;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 8px 15px;
      border-radius: 20px;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 500; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-red { background: #ef4444; box-shadow: 0 0 5px #ef4444; }
    .dot-green { background: #10b981; box-shadow: 0 0 5px #10b981; }

    .map-status {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      color: #10b981;
      font-weight: 600;
    }
    .status-dot {
      width: 8px; height: 8px; background: #10b981; border-radius: 50%;
      margin-right: 8px; animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0.5; } }
  </style>
</head>
<body>
<div id="root">
  <header>
    <nav>
      <div class="logo-container">
        <img src="../logo.svg" alt="CareConnect Logo" class="logo-img">
        <span class="logo-text">CareConnect</span>
      </div>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../index.html#about">About</a></li>
        <li><a href="../index.html#services">Services</a></li>
        <li><a href="../index.html#contact">Contact</a></li>
        <li><a href="dashboard.html" class="auth-btn">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="dashboard-container">
      <div class="dashboard-header">
        <h1>Real-Time Operations Map</h1>
        <p>Live tracking of displaced persons (Red) and available donors (Green).</p>
      </div>

      <div class="map-wrapper">
        <div class="map-header">
          <div class="map-status">
            <span class="status-dot"></span>
            Live System Active
          </div>
          <div class="map-legend">
            <span class="legend-item"><span class="dot dot-red"></span> Displaced Person (Request)</span>
            <span class="legend-item"><span class="dot dot-green"></span> Active Donor</span>
          </div>
        </div>

        <div id="map"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 CareConnect. Government Portal.</p>
  </footer>
</div>

<script src="../script.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script type="module" src="js/live-map.js"></script>

</body>
</html>
