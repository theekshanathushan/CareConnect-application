<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareConnect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root">
    <header>
        <nav>
            <div class="logo-container">
                <img src="logo.svg" alt="CareConnect Logo" class="logo-img">
                <span class="logo-text">CareConnect</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="login.html" class="auth-btn">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero register-hero">
            <div class="animation-elements">
                <div class="floating-element element-1">✍️</div>
                <div class="floating-element element-2">🔐</div>
                <div class="floating-element element-3">👥</div>
                <div class="floating-element element-4">❤️</div>
                <div class="floating-element element-5">✅</div>
            </div>
            <div class="form-container">
                <div class="form-header">
                    <h1>Create Account</h1>
                    <p>Join our community to get or provide support</p>
                </div>
                <form id="registerForm" class="styled-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                                <option value="prefer-not-to-say">Prefer not to say</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="role">Role</label>
                            <select id="role" name="role" required>
                                <option value="" disabled selected>Select Role</option>
                                <option value="displaced">Displaced Person</option>
                                <option value="donator">Donator</option>
                                <option value="government">Government Officer</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" rows="2" required></textarea>
                    </div>

                    <div class="form-options">
                        <div class="checkbox-group">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">I agree to the Terms and Conditions</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="newsletter" name="newsletter">
                            <label for="newsletter">Subscribe to our newsletter</label>
                        </div>
                    </div>

                    <button type="submit" class="btn primary btn-block">Create Account</button>
                </form>

                <div class="form-footer">
                    <p>Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 CareConnect. Helping communities recover together.</p>
    </footer>
</div>

<script src="script.js"></script>
<script type="module">
    import { CONFIG } from './config.js';

    document.addEventListener('DOMContentLoaded', function() {
        // Check URL parameters for role pre-selection (e.g. from index.html buttons)
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');

        if (roleParam) {
            const roleSelect = document.getElementById('role');
            if (roleSelect) {
                if (roleParam === 'displaced') {
                    roleSelect.value = 'displaced';
                } else if (roleParam === 'donator') {
                    roleSelect.value = 'donator';
                }
            }
        }

        const registerForm = document.getElementById('registerForm');

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            // Get form values
            const formData = new FormData(registerForm);
            const userData = Object.fromEntries(formData.entries());

            // Basic validation
            if (userData.password !== userData.confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerText = "Creating Account...";

            try {
                // Send data to Backend API
                const response = await fetch(`${CONFIG.API_BASE_URL}${CONFIG.ENDPOINTS.AUTH.REGISTER}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    alert('Registration successful! Please login with your new account.');
                    window.location.href = 'login.html'; // Redirect to login page
                } else {
                    const errorMsg = await response.text();
                    alert('Registration failed: ' + errorMsg);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Create Account";
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('An error occurred. Please ensure the backend server is running on port 8080.');
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Account";
            }
        });
    });
</script>
</body>
</html>
