<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - CareConnect</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* --- GLOBAL & BACKGROUND --- */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Teal-Blue Gradient Background */
            background: linear-gradient(135deg, #0093E9 0%, #80D0C7 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION --- */
        nav {
            background: transparent !important;
            box-shadow: none !important;
            padding: 1rem 2rem;
            flex-shrink: 0;
        }
        .nav-links a { color: white !important; font-weight: 500; text-decoration: none; }
        .logo-text { color: white !important; }

        /* --- PAGE HEADER (Like Resource Tracker) --- */
        .page-header {
            text-align: center;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        .page-header h1 {
            font-size: 2.5rem;
            /* Bright Green Color matching Resource Tracker */
            color: #2ecc71;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }

        .page-header p {
            color: white;
            font-size: 1rem;
            margin-top: 5px;
            opacity: 0.95;
            font-weight: 400;
        }

        /* --- LAYOUT CONTAINERS --- */
        #root { height: 100%; display: flex; flex-direction: column; }

        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 2rem 2rem 2rem;
            overflow: hidden;
        }

        /* --- THE WHITE CARD --- */
        .chat-card {
            display: flex; width: 100%; max-width: 1100px;
            height: 100%; max-height: 80vh; /* Adjust height to fit header */
            background: white; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .chat-sidebar { width: 320px; background: #fff; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; }

        .sidebar-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f9f9f9;
        }

        /* Self Badge */
        .user-badge { display: flex; align-items: center; gap: 10px; }
        .user-avatar {
            width: 40px; height: 40px; background-color: #007bff;
            color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold;
        }
        .user-text { font-weight: bold; color: #333; }

        .refresh-btn {
            background-color: #20c997; color: white; padding: 5px 12px; border-radius: 15px;
            font-size: 0.8rem; border: none; cursor: pointer; transition: 0.2s;
        }
        .refresh-btn:hover { background-color: #1aa179; }

        .conversation-list { flex: 1; overflow-y: auto; padding: 0; }

        .conversation-item {
            display: flex; align-items: center; padding: 15px 20px; cursor: pointer;
            border-bottom: 1px solid #f9f9f9; transition: background 0.2s;
        }
        .conversation-item:hover { background-color: #f8f9fa; }
        .conversation-item.active { background-color: #f1fcf8; border-left: 4px solid #20c997; }

        .conversation-avatar {
            width: 42px; height: 42px; background-color: #20c997;
            color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1rem; margin-right: 15px;
        }
        .conversation-info h4 { margin: 0; font-size: 0.95rem; color: #333; font-weight: 600; }
        .last-message { margin: 3px 0 0; font-size: 0.75rem; color: #888; }

        /* Role Badges */
        .role-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; border: 1px solid #ddd; background: white; color: #555; }
        .role-gov { color: #0d47a1; border-color: #90caf9; background: #e3f2fd; }
        .role-donor { color: #1b5e20; border-color: #a5d6a7; background: #e8f5e9; }

        /* --- MAIN CHAT AREA --- */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: white; position: relative; }

        .chat-header {
            padding: 20px 30px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center;
        }

        .header-avatar {
            width: 50px; height: 50px; background-color: #007bff;
            color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; margin-right: 15px;
        }

        .chat-header h2 { margin: 0; color: #003366; font-size: 1.4rem; }
        .chat-status { color: #dc3545; font-size: 0.85rem; font-weight: 500; display: block; margin-top: 2px; }
        .green-dash { display: block; width: 30px; height: 3px; background: #20c997; margin-top: 5px; border-radius: 2px; }

        /* MESSAGES */
        .messages-history { flex: 1; padding: 30px; overflow-y: auto; background-color: #fff; display: flex; flex-direction: column; }

        .message-bubble {
            max-width: 65%; padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; margin-bottom: 15px;
            position: relative; line-height: 1.4; word-wrap: break-word;
        }
        .message-bubble.received { background-color: #f1f0f0; color: #333; align-self: flex-start; border-top-left-radius: 4px; }
        .message-bubble.sent { background-color: #007bff; color: white; align-self: flex-end; border-top-right-radius: 4px; }
        .timestamp-small { font-size: 0.65rem; margin-top: 5px; display: block; opacity: 0.7; text-align: right; }
        .chat-image { max-width: 200px; border-radius: 8px; margin-top: 5px; cursor: pointer; }

        /* --- INPUT AREA --- */
        .chat-input-area {
            padding: 20px 30px;
            background: #fff;
            border-top: 1px solid #f9f9f9;
            display: flex; flex-direction: column; gap: 10px;
        }

        .input-box {
            width: 100%; height: 70px;
            border: 1px solid #333;
            border-radius: 10px; padding: 15px;
            font-family: inherit; resize: none; outline: none; font-size: 1rem;
            box-sizing: border-box;
        }

        .input-actions { display: flex; justify-content: flex-end; gap: 10px; }

        /* Buttons */
        .btn-custom {
            padding: 10px 30px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer;
            font-size: 0.9rem; color: white; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-custom:active { transform: scale(0.98); }
        .btn-attach { background-color: #004085; }
        .btn-send { background: linear-gradient(90deg, #20c997, #28a745); }
    </style>
</head>
<body>
<div id="root">
    <header>
        <nav>
            <div class="logo-container">
                <img src="../logo.svg" alt="CareConnect Logo" class="logo-img">
                <span class="logo-text">CareConnect</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#about">About</a></li>
                <li><a href="../index.html#services">Services</a></li>
                <li><a href="../index.html#contact">Contact</a></li>
                <li><a href="dashboard.html" class="auth-btn">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1>Messages</h1>
        <p>Communicate with Officers and Donors</p>
    </div>

    <div class="chat-wrapper">
        <div class="chat-card">
            <div class="chat-sidebar">
                <div class="sidebar-header">
                    <div class="user-badge">
                        <div class="user-avatar">DP</div>
                        <span class="user-text">Me</span>
                    </div>
                    <button class="refresh-btn" id="refreshContactsBtn">Refresh</button>
                </div>

                <div class="conversation-list" id="contactList">
                    <p style="text-align: center; color: #999; padding: 2rem;">Loading contacts...</p>
                </div>
            </div>

            <div class="chat-main">
                <div class="chat-header">
                    <div class="header-avatar" id="chatAvatar">--</div>
                    <div>
                        <h2 id="chatHeaderName">Select a Contact</h2>
                        <div class="green-dash"></div>
                        <span class="chat-status" id="chatHeaderRole">Online</span>
                    </div>
                </div>

                <div class="messages-history" id="messageHistory">
                    <div style="text-align: center; color: #ccc; margin-top: 50px;">
                        Select a contact to start chatting.
                    </div>
                </div>

                <div class="chat-input-area">
                    <textarea class="input-box" id="messageInput" placeholder="Type your message here..." disabled></textarea>

                    <div class="input-actions">
                        <input type="file" id="fileInput" style="display: none;" accept="image/*,.pdf,.doc,.docx">
                        <button class="btn-custom btn-attach" id="attachBtn">Attach</button>
                        <button class="btn-custom btn-send" id="sendBtn" disabled>Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script src="../script.js"></script>
<script type="module" src="js/messages.js"></script>
</body>
</html>
